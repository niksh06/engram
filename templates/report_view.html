<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ name }} — Engram</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#262b36; --fg:#e6e9ef; --mut:#8b93a7; --acc:#6ea8fe; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  a { color:var(--acc); text-decoration:none; } a:hover { text-decoration:underline; }
  header { position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line); padding:12px 22px; font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:24px 22px 80px; }
  article h1 { font-size:26px; margin:.2em 0 .5em; }
  article h2 { font-size:20px; margin:1.4em 0 .5em; border-bottom:1px solid var(--line); padding-bottom:5px; }
  article h3 { font-size:16px; margin:1.2em 0 .4em; }
  article code { background:#11141a; border:1px solid var(--line); border-radius:4px; padding:1px 5px; font-size:13px; }
  article pre { background:#11141a; border:1px solid var(--line); border-radius:8px; padding:12px 14px; overflow:auto; }
  article pre code { border:0; padding:0; }
  article table { border-collapse:collapse; margin:1em 0; width:100%; }
  article th, article td { border:1px solid var(--line); padding:6px 10px; text-align:left; font-size:14px; }
  article th { background:var(--panel); }
  article blockquote { border-left:3px solid var(--line); margin:1em 0; padding:2px 14px; color:var(--mut); }
  details.meta { margin:0 0 18px; background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:8px 12px; }
  details.meta summary { cursor:pointer; color:var(--mut); font-size:13px; }
  details.meta pre { margin:8px 0 0; background:transparent; border:0; font-size:12.5px; color:#aeb6c9; }
</style>
</head>
<body>
<header><a href="/reports">← все отчёты</a> &nbsp;·&nbsp; <span>{{ source_path }}</span></header>
<div class="wrap">
  {% if meta_yaml %}
  <details class="meta"><summary>OKF frontmatter</summary><pre>{{ meta_yaml }}</pre></details>
  {% endif %}
  <article>{{ content_html | safe }}</article>
</div>
</body>
</html>
